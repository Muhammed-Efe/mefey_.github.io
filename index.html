<!DOCTYPE html>
<html>
<head>
<title>Efe'nin Sitesi</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:linear-gradient(270deg,#ff0080,#7928ca,#2af598);
background-size:600% 600%;
animation:arka 10s infinite;
}

@keyframes arka{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
margin-top:200px;
font-size:60px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Efe'nin Süper Sitesi 🚀</h1>

<button onclick="alert('Site çalışıyor!')">
Tıkla
</button>

</body>
</html>
